spring.application.name=climatecast-api
server.port=${PORT:8080}
server.address=0.0.0.0

# OpenWeather (required)
openweather.api.key=${OPENWEATHER_API_KEY}

# Database: Postgres in prod (Neon/Supabase JDBC url), in-memory H2 for local dev
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:climatecast}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Cache: caffeine (in-memory, 10 min TTL) by default.
# For Upstash/Redis set CACHE_TYPE=redis and REDIS_URL=rediss://...
spring.cache.type=${CACHE_TYPE:caffeine}
spring.cache.caffeine.spec=expireAfterWrite=10m
spring.cache.redis.time-to-live=10m
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Auth: Clerk JWKS endpoint. Leave unset to run WITHOUT auth (local dev only).
# e.g. https://your-app.clerk.accounts.dev/.well-known/jwks.json
app.auth.jwks-url=${CLERK_JWKS_URL:}

# CORS (comma-separated origins)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://climatecast-app.vercel.app}
